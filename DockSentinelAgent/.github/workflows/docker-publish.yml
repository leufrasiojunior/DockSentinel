name: Publish Docker (tags only)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  docker:
    runs-on: ubuntu-latest
    environment: ci-ds
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve version
        id: version
        shell: bash
        run: |
          echo "value=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/docksentinel-agent
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,format=short,prefix=sha-

      - name: Add channel tags (latest/alpha/beta)
        id: channel
        shell: bash
        run: |
          REF="${GITHUB_REF_NAME}"
          EXTRA=""
          if [[ "$REF" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            EXTRA="${{ secrets.DOCKERHUB_USERNAME }}/docksentinel-agent:latest"
          fi
          if [[ "$REF" == *"-alpha."* ]]; then
            EXTRA="${{ secrets.DOCKERHUB_USERNAME }}/docksentinel-agent:alpha"
          fi
          if [[ "$REF" == *"-beta."* ]]; then
            EXTRA="${{ secrets.DOCKERHUB_USERNAME }}/docksentinel-agent:beta"
          fi

          echo "extra_tags<<EOF" >> $GITHUB_OUTPUT
          echo "$EXTRA" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build and push agent (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            APP_VERSION=${{ steps.version.outputs.value }}
          tags: |
            ${{ steps.meta.outputs.tags }}
            ${{ steps.channel.outputs.extra_tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
