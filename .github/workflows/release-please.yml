name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_as:
        description: "Forca a proxima release estavel (ex: 2.1.0 ou 2.5.0)"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    environment: ci-ds
    steps:
      - name: Release Please
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.release_as == '' }}
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          target-branch: main
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json

      - name: Release Please (release_as)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.release_as != '' }}
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          target-branch: main
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json
          release-as: ${{ inputs.release_as }}
